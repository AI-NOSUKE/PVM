name: PVM CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pvm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PIP_NO_INPUT: "1"
      TOKENIZERS_PARALLELISM: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke checks
        shell: bash
        run: |
          set -euxo pipefail
          python -m py_compile PVM.py
          VERSION="$(python PVM.py --version)"
          test "${VERSION}" = "PVM-standard-6.0.0"
          python PVM.py --self-check
